name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  swift:
    name: SwiftPM + TraceMacApp build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version

      - name: SwiftPM tests
        run: |
          set -euo pipefail
          swift test

      - name: TraceMacApp (unsigned) build
        run: |
          set -euo pipefail
          xcodebuild \
            -project Apps/TraceMacApp/TraceMacApp.xcodeproj \
            -scheme TraceMacApp \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

