name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  swift:
    name: SwiftPM + TraceMacApp build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: SwiftPM tests
        run: |
          set -euo pipefail
          swift test

      - name: API breaking changes (SDK targets, PRs only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set -euo pipefail
          swift package diagnose-api-breaking-changes Terra
          swift package diagnose-api-breaking-changes TerraTraceKit

      - name: TraceMacApp (unsigned) build
        run: |
          set -euo pipefail
          xcodebuild \
            -project Apps/TraceMacApp/TraceMacApp.xcodeproj \
            -scheme TraceMacApp \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
